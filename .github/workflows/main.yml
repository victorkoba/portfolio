name: Enviar Email

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4 # Atualizado para v4

      - name: Configurar Python
        uses: actions/setup-python@v5 # Atualizado para v5
        with:
          python-version: '3.12' # Versão estável e disponível
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          # Ajuste o caminho se o arquivo estiver na raiz ou em app/
          pip install -r app/requirements.txt

      - name: Executar script de email
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python app/main.py
